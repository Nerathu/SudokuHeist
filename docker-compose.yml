services:
  sudokuheist:
    build: .
    container_name: sudokuheist
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - sudokuheist_data:/data
    environment:
      DB_PATH: /data/sudokuheist.db
      BASE_PATH: /sudokuheist
      TZ: Europe/Berlin

  nginx:
    image: nginx:1.27-alpine
    container_name: sudokuheist-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8787}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sudokuheist

volumes:
  sudokuheist_data:
